<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Pulse Synthesizer - 4D Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #000;
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            transition: background 0.5s ease;
        }

        /* 3D Perspective Container for "4D" effects */
        .perspective-container {
            perspective: 1200px;
            transform-style: preserve-3d;
        }

        /* Number pulse animation utilities */
        #number-display {
            transform-origin: center center;
            will-change: transform, text-shadow, filter, color;
            transform-style: preserve-3d;
        }

        /* Signature Wave Animation */
        @keyframes wave-bounce {
            0%, 100% { transform: scaleY(0.3); }
            50% { transform: scaleY(1); }
        }
        .wave-bar {
            transform-origin: bottom;
            animation: wave-bounce 1s ease-in-out infinite;
            animation-play-state: paused;
        }
        .is-playing .wave-bar {
            animation-play-state: running;
        }
        .wave-bar:nth-child(1) { animation-delay: 0.0s; background-color: #22d3ee; box-shadow: 0 0 8px #22d3ee; }
        .wave-bar:nth-child(2) { animation-delay: 0.2s; background-color: #a855f7; box-shadow: 0 0 8px #a855f7; }
        .wave-bar:nth-child(3) { animation-delay: 0.4s; background-color: #ec4899; box-shadow: 0 0 8px #ec4899; }
        .wave-bar:nth-child(4) { animation-delay: 0.6s; background-color: #ef4444; box-shadow: 0 0 8px #ef4444; }

        /* Overlay Animations */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(30px, -50px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 7s infinite; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .animation-delay-6000 { animation-delay: 6s; }

        @keyframes letter-flow {
            0%, 100% { text-shadow: 0 0 15px #22d3ee, 0 0 30px #a855f7; transform: translateY(0); color: #fff; }
            50% { text-shadow: 0 0 25px #ec4899, 0 0 50px #ef4444, 0 0 80px #ef4444; transform: translateY(-15px) scale(1.1); color: #ffebf0; }
        }
        #main-title span {
            display: inline-block;
            color: #fff;
            animation: letter-flow 2.5s ease-in-out infinite;
            will-change: transform, text-shadow;
        }

        @keyframes gradient-x {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }
        .animate-gradient-x {
            background-size: 200% 200%;
            animation: gradient-x 3s ease infinite;
        }

        @keyframes button-pulse-idle {
            0%, 100% { box-shadow: 0 0 30px rgba(255,255,255,0.4); transform: scale(1); }
            50% { box-shadow: 0 0 50px rgba(255,255,255,0.7); transform: scale(1.05); }
        }
        #start-btn { animation: button-pulse-idle 2s ease-in-out infinite; }
        #start-btn:hover {
            animation: none;
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255,255,255,0.9);
        }
        
        @keyframes grid-scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }
        .synthwave-grid {
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.07) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.07) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg) scale(2);
            transform-origin: bottom;
            animation: grid-scroll 1s linear infinite;
        }

        @keyframes sweep {
            0% { transform: translateX(-100%) skewX(-15deg); }
            100% { transform: translateX(200%) skewX(-15deg); }
        }
        .group-hover\:animate-sweep:hover { animation: sweep 0.8s ease-in-out; }

        /* Homepage Hype Animations */
        @keyframes float-up {
            0% { transform: translateY(110vh) rotate(0deg) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; filter: brightness(200%); }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) rotate(360deg) scale(1.2); opacity: 0; }
        }
        .hype-particle {
            position: absolute;
            animation: float-up linear infinite;
            will-change: transform, opacity;
        }
        @keyframes glitch-skew {
            0%, 94%, 98%, 100% { transform: skewX(0deg); }
            96% { transform: skewX(-15deg) translateX(-5px); filter: hue-rotate(90deg) drop-shadow(0 0 20px red); }
            97% { transform: skewX(15deg) translateX(5px); filter: hue-rotate(-90deg) drop-shadow(0 0 20px cyan); }
        }
        .animate-glitch { animation: glitch-skew 4s infinite; }

        /* Party Cat Image Utilities */
        .party-cat {
            will-change: transform, filter;
            object-fit: cover; /* Ensures gifs fit nicely */
            transition: opacity 0.3s ease;
        }

        /* Custom Slider Styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]:focus {
            outline: none;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 8px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: background 0.3s;
        }
        input[type=range]:hover::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.2);
        }
        input[type=range]::-webkit-slider-thumb {
            height: 28px;
            width: 28px;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -10px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            transition: transform 0.1s;
        }
        input[type=range]::-webkit-slider-thumb:active {
            transform: scale(1.3);
        }
    </style>
</head>
<body class="text-white h-screen flex flex-col items-center justify-center select-none">

                    <span class="text-sm md:text-base animate-bounce">⚠️</span> SENSORY OVERLOAD WARNING <span class="text-sm md:text-base animate-bounce" style="animation-delay: 0.1s;">⚠️</span>

    <script>
        const mainTitle = document.getElementById('main-title');
        mainTitle.innerHTML = mainTitle.textContent.split('').map((char, i) => 
            char === ' ' ? '&nbsp;' : `<span style="animation-delay: ${i * 0.1}s">${char}</span>`
        ).join('');

        let audioCtx;
        let osc1, osc2, filter, masterGain;
        let isPlaying = false;
        let currentNumber = 5;
        let currentWaveform = 'mix';
        let loopTimeoutId;

        let moodSettings = { tempoMult: 1.0, filterMult: 6.0, detune: 12 };

        // --- 10 UNIQUE PARTY CATS & POSITIONS ---
        // Fetch 10 truly unique cat gifs from TheCatAPI to bypass caching/same-gif issues
        const catGifs = Array(10).fill('https://cataas.com/cat/gif?t=' + Date.now());
        fetch('https://api.thecatapi.com/v1/images/search?mime_types=gif&limit=10')
            .then(res => res.json())
            .then(data => {
                if(data && data.length > 0) {
                    for(let i=0; i<data.length; i++) {
                        catGifs[i] = data[i].url;
                    }
                    if (leftCat && rightCat) {
                        leftCat.src = catGifs[currentNumber - 1];
                        rightCat.src = catGifs[currentNumber - 1];
                    }
                }
            })
            .catch(err => console.log('Using fallback cats'));

        // Strict safe-zone screen positions (avoids navbar and center number)
        const catPositions = [
            { top: '60%', left: '3vw', right: '3vw' },     // 1: Safe lower
            { top: '25%', left: '5vw', right: '5vw' },     // 2: Safe upper
            { top: '45%', left: '2vw', right: '2vw' },     // 3: Middle extreme edge
            { top: '15%', left: '6vw', right: '6vw' },     // 4: High up
            { top: '55%', left: '4vw', right: '4vw' },     // 5: Lower mid
            { top: '35%', left: '3vw', right: '3vw' },     // 6: Upper mid extreme
            { top: '65%', left: '6vw', right: '6vw' },     // 7: Lowest safe (above navbar)
            { top: '20%', left: '2vw', right: '2vw' },     // 8: Top extreme corners
            { top: '50%', left: '8vw', right: '8vw' },     // 9: True mid, slight inset
            { top: '40%', left: '7vw', right: '7vw' }      // 10: Slightly inset mid
        ];

        const scaleFrequencies = [65.41, 77.78, 87.31, 98.00, 116.54, 130.81, 155.56, 174.61, 196.00, 233.08];

        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const toggleBtn = document.getElementById('toggle-btn');
        const slider = document.getElementById('number-slider');
        const display = document.getElementById('number-display');
        const waveformSelect = document.getElementById('waveform-select');
        const moodInput = document.getElementById('mood-input');
        const moodStatus = document.getElementById('mood-status');
        
        const leftCatCont = document.getElementById('left-cat-container');
        const rightCatCont = document.getElementById('right-cat-container');
        const leftCat = document.getElementById('left-cat');
        const rightCat = document.getElementById('right-cat');

        leftCat.src = catGifs[4];
        rightCat.src = catGifs[4];

        function initAudio() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();

            osc1 = audioCtx.createOscillator();
            osc2 = audioCtx.createOscillator();
            filter = audioCtx.createBiquadFilter();
            masterGain = audioCtx.createGain();

            applyWaveform();
            osc2.detune.value = moodSettings.detune;

            filter.type = 'lowpass';
            filter.Q.value = 8;

            masterGain.gain.value = 0;

            osc1.connect(filter);
            osc2.connect(filter);
            filter.connect(masterGain);
            masterGain.connect(audioCtx.destination);

            osc1.start();
            osc2.start();
        }

        function applyWaveform() {
            if (!osc1 || !osc2) return;
            if (currentWaveform === 'mix') {
                osc1.type = 'sawtooth';
                osc2.type = 'square';
            } else {
                osc1.type = currentWaveform;
                osc2.type = currentWaveform;
            }
        }

        function triggerPulse() {
            if (!isPlaying) return;

            const time = audioCtx.currentTime;
            const targetFreq = scaleFrequencies[currentNumber - 1];
            
            const minTempo = 800 * moodSettings.tempoMult; 
            const maxTempo = 100 * moodSettings.tempoMult;
            const tempoMs = minTempo - ((currentNumber - 1) * (minTempo - maxTempo) / 9);
            const durationSec = tempoMs / 1000;

            const attackTime = 0.02;
            const decayTime = durationSec * 0.8;

            osc1.frequency.setValueAtTime(targetFreq, time);
            osc2.frequency.setValueAtTime(targetFreq, time);

            filter.frequency.cancelScheduledValues(time);
            filter.frequency.setValueAtTime(targetFreq * moodSettings.filterMult, time);
            filter.frequency.exponentialRampToValueAtTime(targetFreq, time + decayTime);

            masterGain.gain.cancelScheduledValues(time);
            masterGain.gain.setValueAtTime(0, time);
            masterGain.gain.linearRampToValueAtTime(0.4, time + attackTime);
            masterGain.gain.exponentialRampToValueAtTime(0.001, time + decayTime);

            triggerVisualPulse(tempoMs);

            loopTimeoutId = setTimeout(triggerPulse, tempoMs);
        }

        function getAwesomePulseStyles(num, hue) {
            const base = `hsl(${hue}, 100%, 50%)`;
            const bright = `hsl(${hue}, 100%, 70%)`;
            const dark = `hsl(${hue}, 100%, 20%)`;

            switch(num) {
                case 1: return { transform: 'scale(1.25) translateY(4vh)', filter: 'none', color: '#fff', textShadow: `0 -10px 30px ${base}, 0 40px 100px ${dark}` };
                case 2: return { transform: 'scaleX(1.4) scaleY(0.7) translateY(2vh)', filter: 'none', color: '#fff', textShadow: `0 0 60px ${base}` };
                case 3: return { transform: 'scale(1.3) skewX(-20deg)', filter: 'none', color: '#fff', textShadow: `-30px 0 0 red, 30px 0 0 cyan, 0 0 50px ${base}` };
                case 4: return { transform: 'scale(1.6)', filter: 'blur(3px)', color: 'rgba(255,255,255,0.1)', textShadow: `0 0 20px #fff, 0 0 80px ${bright}, 0 0 150px ${base}` };
                case 5: return { transform: 'scale(1.4) rotateX(45deg) rotateY(-25deg)', filter: 'drop-shadow(0 50px 30px rgba(0,0,0,0.8))', color: '#fff', textShadow: `-15px 15px 0 hsla(${hue},100%,50%,0.6), -30px 30px 20px ${dark}` };
                case 6: return { transform: 'scale(0.6) rotateZ(15deg)', filter: 'contrast(150%) brightness(150%)', color: '#fff', textShadow: `0 0 200px ${bright}, 0 0 300px ${base}` };
                case 7: return { transform: 'scale(1.5)', filter: 'none', color: '#000', textShadow: `0 0 5px #fff, 0 0 10px #fff, 0 0 40px ${base}, 0 0 80px ${base}` };
                case 8: return { transform: 'scale(1.3) translateX(8vw) skewX(35deg)', filter: 'blur(2px)', color: '#fff', textShadow: `-80px 0 30px ${base}` };
                case 9: return { transform: 'scale(1.4)', filter: 'none', color: '#000', textShadow: `0 0 20px #fff, 0 0 60px ${bright}, 0 0 150px ${base}` };
                case 10: return { transform: 'scale(1.8) rotateZ(-5deg)', filter: 'hue-rotate(45deg) saturate(200%)', color: '#fff', textShadow: `-20px -20px 0 #ff00ff, 20px 20px 0 #00ffff, 0 0 100px #fff, 0 0 250px ${base}` };
                default: return { transform: 'scale(1.2)', filter: 'none', color: '#fff', textShadow: `0 0 50px ${base}` };
            }
        }

        function triggerVisualPulse(tempoMs) {
            const hue = 220 + ((currentNumber - 1) * 15);
            
            display.style.transition = `all 50ms cubic-bezier(0.1, 1.3, 0.3, 1)`;
            document.body.style.background = `radial-gradient(circle at center, hsla(${hue}, 100%, 25%, 1) 0%, #000 60%)`;

            const styles = getAwesomePulseStyles(currentNumber, hue);
            display.style.transform = styles.transform;
            display.style.filter = styles.filter;
            display.style.color = styles.color;
            display.style.textShadow = styles.textShadow;

            leftCat.style.transition = `all 50ms cubic-bezier(0.1, 1.3, 0.3, 1)`;
            rightCat.style.transition = `all 50ms cubic-bezier(0.1, 1.3, 0.3, 1)`;
            
            const catScale = 1 + (currentNumber * 0.05);
            let catFilter = `drop-shadow(0 0 20px hsl(${hue}, 100%, 50%))`;
            
            if (currentNumber >= 8) catFilter += ` hue-rotate(${Math.random() * 360}deg) saturate(300%)`;
            if (currentNumber === 10) catFilter += ` invert(1)`;

            leftCat.style.transform = `scale(${catScale}) rotate(-10deg) translateY(-20px)`;
            rightCat.style.transform = `scaleX(-1) scale(${catScale}) rotate(-10deg) translateY(-20px)`;
            leftCat.style.filter = catFilter;
            rightCat.style.filter = catFilter;

            setTimeout(() => {
                if(!isPlaying) return;
                
                const decayTime = tempoMs * 0.7;
                display.style.transition = `all ${decayTime}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
                
                display.style.transform = 'scale(1) rotate(0) rotateX(0) rotateY(0) rotateZ(0) skew(0) translateZ(0)';
                display.style.filter = 'blur(0px) hue-rotate(0deg) contrast(100%) drop-shadow(0 0 0 transparent)';
                
                display.style.color = `hsl(${hue}, 40%, 70%)`;
                display.style.textShadow = `0 0 20px hsl(${hue}, 60%, 20%)`;
                
                document.body.style.background = `radial-gradient(circle at center, hsla(${hue}, 30%, 5%, 1) 0%, #000 70%)`;

                leftCat.style.transition = `all ${decayTime}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
                rightCat.style.transition = `all ${decayTime}ms cubic-bezier(0.2, 0.8, 0.2, 1)`;
                
                leftCat.style.transform = `scale(1) rotate(0deg) translateY(0)`;
                rightCat.style.transform = `scaleX(-1) scale(1) rotate(0deg) translateY(0)`;
                leftCat.style.filter = `drop-shadow(0 0 5px hsl(${hue}, 50%, 20%))`;
                rightCat.style.filter = `drop-shadow(0 0 5px hsl(${hue}, 50%, 20%))`;
            }, 50); 
        }

        function updateNumber(newNum) {
            currentNumber = newNum;
            slider.value = newNum;
            display.textContent = currentNumber;
            
            // Instantly fetch the unique cat gif for the new level
            const catGifSrc = catGifs[currentNumber - 1];
            leftCat.src = catGifSrc;
            rightCat.src = catGifSrc;

            // Move the cats to their unique dimension positions!
            const pos = catPositions[currentNumber - 1];
            leftCatCont.style.top = pos.top;
            leftCatCont.style.left = pos.left;
            rightCatCont.style.top = pos.top;
            rightCatCont.style.right = pos.right;

            const hue = 220 + ((currentNumber - 1) * 15);
            if(!isPlaying) {
                display.style.transition = 'all 0.3s ease';
                display.style.color = `hsl(${hue}, 40%, 70%)`;
                display.style.textShadow = `0 0 20px hsl(${hue}, 60%, 20%)`;
            }
        }

        startBtn.addEventListener('click', () => {
            initAudio();
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 700);
            
            isPlaying = true;
            document.body.classList.add('is-playing');
            leftCatCont.style.opacity = '1';
            rightCatCont.style.opacity = '1';

            toggleBtn.textContent = 'STOP';
            toggleBtn.className = 'px-6 py-2 bg-red-500/10 border-2 border-red-500 rounded-full text-red-500 hover:bg-red-500 hover:text-black font-black transition-all w-32 shadow-[0_0_20px_rgba(239,68,68,0.3)] tracking-widest text-base';
            
            triggerPulse();
        });

        slider.addEventListener('input', (e) => updateNumber(parseInt(e.target.value, 10)));

        moodInput.addEventListener('input', (e) => {
            const text = e.target.value.toLowerCase();
            let matchedMood = null;
            
            moodSettings.tempoMult = 1.0;
            moodSettings.filterMult = 6.0;
            moodSettings.detune = 12;
            let newWaveform = 'mix';

            if (text.match(/calm|relax|chill|peace|slow|soft/)) {
                moodSettings.tempoMult = 2.0; moodSettings.filterMult = 2.0; newWaveform = 'sine'; matchedMood = "Calm";
            } else if (text.match(/energetic|excit|fast|hype|crazy|intense/)) {
                moodSettings.tempoMult = 0.4; moodSettings.filterMult = 12.0; newWaveform = 'sawtooth'; matchedMood = "Energetic";
            } else if (text.match(/dark|spooky|sad|scary|doom|creep/)) {
                moodSettings.tempoMult = 1.5; moodSettings.filterMult = 3.0; moodSettings.detune = -45; newWaveform = 'square'; matchedMood = "Dark";
            } else if (text.match(/happy|bright|joy|upbeat|fun/)) {
                moodSettings.tempoMult = 0.7; moodSettings.filterMult = 8.0; newWaveform = 'triangle'; matchedMood = "Happy";
            }

            if (currentWaveform !== newWaveform && matchedMood !== null) {
                currentWaveform = newWaveform;
                waveformSelect.value = currentWaveform;
                applyWaveform();
            }
            if (osc2 && audioCtx) {
                osc2.detune.setTargetAtTime(moodSettings.detune, audioCtx.currentTime, 0.1);
            }

            if (matchedMood) {
                moodStatus.style.opacity = '1';
                moodStatus.textContent = `${matchedMood} MODE`;
                clearTimeout(moodInput.feedbackTimeout);
                moodInput.feedbackTimeout = setTimeout(() => { moodStatus.style.opacity = '0'; }, 2000);
            } else {
                moodStatus.style.opacity = '0';
            }
        });

        waveformSelect.addEventListener('change', (e) => {
            currentWaveform = e.target.value;
            applyWaveform();
        });

        document.addEventListener('keydown', (e) => {
            if (document.activeElement === moodInput) return;
            if (document.activeElement === waveformSelect || document.activeElement === slider || document.activeElement === toggleBtn) {
                document.activeElement.blur();
            }

            let newNum = null;
            if (e.key === 'ArrowUp') {
                e.preventDefault(); 
                newNum = Math.min(10, currentNumber + 1);
            } else if (e.key === 'ArrowDown') {
                e.preventDefault(); 
                newNum = Math.max(1, currentNumber - 1);
            } else if (e.key === ' ' && overlay.style.display === 'none') {
                e.preventDefault(); 
                toggleBtn.click();
            }
            
            if (newNum !== null && newNum !== currentNumber) updateNumber(newNum);
        });

        toggleBtn.addEventListener('click', () => {
            if (isPlaying) {
                isPlaying = false;
                document.body.classList.remove('is-playing');
                leftCatCont.style.opacity = '0';
                rightCatCont.style.opacity = '0';
                clearTimeout(loopTimeoutId);
                
                toggleBtn.textContent = 'PLAY';
                toggleBtn.className = 'px-6 py-2 bg-green-500/10 border-2 border-green-500 rounded-full text-green-400 hover:bg-green-500 hover:text-black font-black transition-all w-32 shadow-[0_0_20px_rgba(34,197,94,0.3)] tracking-widest text-base';
                
                if (masterGain) {
                    masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
                    masterGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
                }
                
                display.style.transition = 'all 0.5s ease-out';
                display.style.transform = 'scale(1) rotate(0) rotateX(0) rotateY(0) rotateZ(0) skew(0) translateZ(0)';
                display.style.filter = 'none';
                display.style.textShadow = 'none';
                display.style.color = '#334155';
                document.body.style.background = '#000';
            } else {
                isPlaying = true;
                document.body.classList.add('is-playing');
                leftCatCont.style.opacity = '1';
                rightCatCont.style.opacity = '1';
                toggleBtn.textContent = 'STOP';
                toggleBtn.className = 'px-6 py-2 bg-red-500/10 border-2 border-red-500 rounded-full text-red-500 hover:bg-red-500 hover:text-black font-black transition-all w-32 shadow-[0_0_20px_rgba(239,68,68,0.3)] tracking-widest text-base';
                
                if(audioCtx.state === 'suspended') audioCtx.resume();
                triggerPulse();
            }
        });
    </script>
</body>
</html>
